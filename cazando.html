<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cazando Arcade - Johann</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego();">

  <div class="game-wrapper">
    <header class="game-header">
      <h1>Cazando <span class="badge">Arcade</span></h1>
      <p class="author">By: <strong>Johann Cacuango</strong></p> </header>

    <div class="game-layout">
      <section class="canvas-container">
        <canvas id="areaJuego" width="500" height="500"></canvas>
        <p id="mensaje"></p>
      </section>

      <aside class="dashboard">
        <div class="stats-panel">
          <div class="stat-box">
            <label>PUNTOS</label>
            <span id="puntaje">0</span>
          </div>
          <div class="stat-box highlight">
            <label>TIEMPO</label>
            <span id="tiempo">10</span>
          </div>
        </div>

        <div class="controller">
          <div class="d-pad">
            <button id="btnArriba" class="btn-ctrl">▲</button>
            <div class="d-pad-middle">
              <button id="btnIzquierda" class="btn-ctrl">◀</button>
              <button id="btnAbajo" class="btn-ctrl">▼</button>
              <button id="btnDerecha" class="btn-ctrl">▶</button>
            </div>
          </div>
          <button id="btnReiniciar" class="btn-reset">REINICIAR</button>
        </div>
      </aside>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>
</html>

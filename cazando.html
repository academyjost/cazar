<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRON: ARES - Protocolo de Caza</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego();">

  <div class="grid-background"></div>

  <div class="interface-container">
    <aside class="promo-sidebar">
   <img src="image_37608b.jpg" alt="TRON Ares Poster" class="promo-img">
   <div class="glitch-title">SISTEMA ARES</div>
   </aside>

    <main class="game-core">
      <header class="game-header">
        <h1>TRON <span class="neon-text">CAZANDO</span></h1>
        <p class="user-id">USUARIO: <span>JOHANN</span></p>
      </header>

      <div class="canvas-frame">
        <canvas id="areaJuego" width="500" height="500"></canvas>
        <p id="mensaje"></p>
      </div>
    </main>

    <aside class="control-center">
      <div class="data-readout">
        <div class="data-bit">
          <label>PUNTOS</label>
          <span id="puntaje">0</span>
        </div>
        <div class="data-bit alert">
          <label>TIEMPO</label>
          <span id="tiempo">10</span>
        </div>
      </div>

      <div class="navigation-panel">
        <div class="d-pad">
          <button id="btnArriba" class="nav-btn">▲</button>
          <div class="middle-row">
            <button id="btnIzquierda" class="nav-btn">◀</button>
            <button id="btnAbajo" class="nav-btn">▼</button>
            <button id="btnDerecha" class="nav-btn">▶</button>
          </div>
        </div>
        <button id="btnReiniciar" class="reboot-btn">REINICIAR PROTOCOLO</button>
      </div>
    </aside>
  </div>

  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>
</html>

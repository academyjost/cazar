<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cazando - Arcade Pro</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego();">

  <div class="game-container">
    <header>
      <h1>Cazando</h1>
      <p class="author">Creado por: <span>Johann</span></p>
    </header>

    <div class="main-layout">
      <div class="canvas-wrapper">
        <canvas id="areaJuego" width="500" height="500"></canvas>
        <p id="mensaje"></p>
      </div>

      <aside class="side-panel">
        <div class="stats-card">
          <div class="stat">
            <span class="label">PUNTOS</span>
            <span id="puntaje" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">TIEMPO</span>
            <span id="tiempo" class="value">10</span>
          </div>
        </div>

        <div class="controles">
          <div class="d-pad">
            <button id="btnArriba" class="btn-dir">▲</button>
            <div class="horizontal-btns">
              <button id="btnIzquierda" class="btn-dir">◀</button>
              <button id="btnAbajo" class="btn-dir">▼</button>
              <button id="btnDerecha" class="btn-dir">▶</button>
            </div>
          </div>
          <button id="btnReiniciar" class="btn-action">REINICIAR JUEGO</button>
        </div>
      </aside>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>
</html>
